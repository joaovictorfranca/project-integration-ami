syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.eletra.integracao.network_grpc.grpc";
option java_outer_classname = "ConnectionProto";

service EletraISService {
  // rpc NomeMetodo (Entrada) returns (Saída);
  rpc CreateTransaction (TransactionRequest) returns (TransactionResponse);
}

message TransactionRequest {
  string json_payload = 1;
}

message TransactionResponse {
  string ticket_id = 1;
  string status = 2;
}