spring.application.name=network-grpc

#?stringtype=unspecified
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ami_db}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# se o banco ja tiver dados, ele marca como base e aplica as novas migrations
spring.flyway.baseline-on-migrate=true

spring.artemis.mode=native
spring.artemis.host=${HOST_ARTEMIS:localhost}
spring.artemis.port=${BROKER_PORT:61616}
spring.artemis.user=${USER_ARTEMIS:admin}
spring.artemis.password=${PASSWORD_ARTEMIS:admin}

#define qual porta o servidor grpc vai rodar
grpc.server.port=${GRPC_PORT:9090}

# interessante pois estou usando enums, entao o hibernate precisa saber o dialeto
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# a linha a seguir e para mostrar o sql que o hibernate esta gerando no console e interessante para debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Artemis queues
queue.training-converter.name=${QUEUE_TO_SEND:training-converter.receive_as_json}