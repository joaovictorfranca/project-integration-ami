spring.application.name=business


# Desativa o suporte automático ao Docker Compose da main para não conflitar
spring.docker.compose.enabled=false

# Opcional: Mostra logs detalhados do Testcontainers para você ver ele subindo
logging.level.org.testcontainers=INFO

# Limpa qualquer URL manual para que o @ServiceConnection preencha sozinho
spring.artemis.broker-url=
spring.artemis.user=
spring.artemis.password=
