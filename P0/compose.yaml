#version: "3.9"

services:
  artemis:
    image: apache/activemq-artemis:latest
    container_name: ami-activemq
    ports:
      - "61616:61616"
      - "8161:8161"
    environment:
      ARTEMIS_USER: admin
      ARTEMIS_PASSWORD: admin
  postgres:
    image: postgres:15
    container_name: ami-postgres
    environment:
      - POSTGRES_DB=ami_db
      - POSTGRES_PASSWORD=admin
      - POSTGRES_USER=admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: ami-redis
    ports:
      - "6379:6379"
volumes:
  postgres_data: